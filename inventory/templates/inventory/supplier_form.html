{% extends "inventory/base.html" %}
{% block title %}Add Supplier{% endblock %}
{% block page_title %}Add supplier{% endblock %}

{% block topbar_actions %}
  <a href="{% url 'inventory:supplier_list' %}" class="btn">
    <i class="ti ti-arrow-left"></i> Back
  </a>
{% endblock %}

{% block content %}
<div style="max-width:560px">
  <div class="card">
    <div class="card-header">
      <div>
        <div class="card-title">New supplier</div>
        <div class="card-subtitle">Add a vendor or manufacturer</div>
      </div>
    </div>

    <form method="post">
      {% csrf_token %}
      <div style="display:flex;flex-direction:column;gap:16px">

        <div class="form-group">
          <label class="form-label">Supplier name *</label>
          <input type="text" name="name" class="form-control" placeholder="e.g. Acme Corp" required/>
        </div>

        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" placeholder="orders@supplier.com"/>
          </div>
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input type="text" name="phone" class="form-control" placeholder="+1 555 000 0000"/>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Address</label>
          <textarea name="address" rows="2" class="form-control" placeholder="Street, City, Country…"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Notes</label>
          <textarea name="notes" rows="2" class="form-control" placeholder="Payment terms, lead times…"></textarea>
        </div>

        <div style="display:flex;gap:10px;padding-top:10px;border-top:1px solid var(--border)">
          <button type="submit" class="btn btn-primary">
            <i class="ti ti-check"></i> Create supplier
          </button>
          <a href="{% url 'inventory:supplier_list' %}" class="btn">Cancel</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
