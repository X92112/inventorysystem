{% extends "inventory/base.html" %}
{% block title %}Add Category{% endblock %}
{% block page_title %}Add category{% endblock %}

{% block topbar_actions %}
  <a href="{% url 'inventory:category_list' %}" class="btn">
    <i class="ti ti-arrow-left"></i> Back
  </a>
{% endblock %}

{% block content %}
<div style="max-width:480px">
  <div class="card">
    <div class="card-header">
      <div>
        <div class="card-title">New category</div>
        <div class="card-subtitle">Categories group your products</div>
      </div>
    </div>

    <form method="post">
      {% csrf_token %}
      <div style="display:flex;flex-direction:column;gap:16px">

        <div class="form-group">
          <label class="form-label">Name *</label>
          <input type="text" name="name" class="form-control" placeholder="e.g. Electronics" required/>
        </div>

        <div class="form-group">
          <label class="form-label">Color (for dashboard bar)</label>
          <input type="color" name="color" value="#378ADD" class="form-control" style="height:42px;padding:4px 8px;cursor:pointer"/>
        </div>

        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea name="description" rows="3" class="form-control" placeholder="Optional description…"></textarea>
        </div>

        <div style="display:flex;gap:10px;padding-top:10px;border-top:1px solid var(--border)">
          <button type="submit" class="btn btn-primary">
            <i class="ti ti-check"></i> Create category
          </button>
          <a href="{% url 'inventory:category_list' %}" class="btn">Cancel</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
