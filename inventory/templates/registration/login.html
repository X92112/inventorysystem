<!DOCTYPE html>
<html>
<head>
  <title>Login — inventory system</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f5f4f1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 14px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
    }
    .logo {
      font-size: 20px;
      font-weight: 600;
      color: #1a1916;
      margin-bottom: 6px;
    }
    .logo span { color: #2563eb; }
    .subtitle { font-size: 13px; color: #9e9d96; margin-bottom: 28px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    label { font-size: 12px; font-weight: 500; color: #6b6960; }
    input {
      padding: 9px 12px;
      border: 1px solid rgba(0,0,0,0.14);
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }
    .btn {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.1s;
    }
    .btn:hover { background: #1d4ed8; }
    .error {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">inventory<span>system</span></div>
    <div class="subtitle">Sign in into admin panel</div>

    {% if form.errors %}
    <div class="error">Incorrect username or password.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" autofocus required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required/>
      </div>
      <button type="submit" class="btn">Sign in</button>
    </form>
  </div>
</body>
</html>
